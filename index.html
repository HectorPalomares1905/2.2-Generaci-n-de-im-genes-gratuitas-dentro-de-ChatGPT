<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generación de imágenes gratuitas dentro de ChatGPT</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Montserrat', sans-serif; background: #f0f2f5; color: #333; }
    .slide { width: 100%; max-width: 1024px; margin: 20px auto; background: #fff; border-radius: 20px; box-shadow: 0 8px 30px rgba(0,0,0,0.12); overflow: hidden; min-height: 500px; display: flex; flex-direction: column; }
    .slide-header { background: #3d5a96; padding: 18px 30px; display: flex; align-items: center; justify-content: space-between; }
    .slide-header h2 { color: #fff; font-size: 20px; font-weight: 700; }
    .slide-header .num { color: rgba(255,255,255,0.6); font-size: 14px; }
    .slide-body { padding: 30px; flex: 1; }
    .slide-footer { background: #2e4575; padding: 10px 30px; display: flex; justify-content: space-between; color: rgba(255,255,255,0.7); font-size: 12px; }
    .portada { min-height: 90vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; position: relative; overflow: hidden; }
    .portada-bg { position: absolute; inset: 0; background: linear-gradient(135deg, #3d5a96 0%, #e8755c 50%, #d05a7e 100%); z-index: 0; }
    .portada .franja1 { position: absolute; bottom: 0; left: 0; right: 0; height: 12px; background: #e8755c; z-index: 1; }
    .portada .franja2 { position: absolute; top: 0; right: 0; width: 25%; height: 8%; background: #d05a7e; z-index: 1; }
    .portada .franja3 { position: absolute; bottom: 0; left: 0; width: 10%; height: 18%; background: #d05a7e; z-index: 1; }
    .portada .franja4 { position: absolute; bottom: 0; right: 0; width: 15%; height: 12%; background: #e8755c; z-index: 1; }
    .portada-content { position: relative; z-index: 2; padding: 40px; }
    .portada .campus { color: rgba(255,255,255,0.7); font-size: 13px; letter-spacing: 4px; font-weight: 700; margin-bottom: 40px; }
    .portada h1 { color: #fff; font-size: 48px; font-weight: 900; line-height: 1.2; margin-bottom: 8px; text-shadow: 3px 3px 12px rgba(0,0,0,0.2); }
    .portada h1 span { display: block; font-size: 32px; font-weight: 600; }
    .portada .tema-label { color: rgba(255,255,255,0.85); font-size: 18px; margin-top: 50px; }
    .portada .tema { color: #fff; font-size: 26px; font-weight: 700; margin-top: 8px; line-height: 1.4; }
    .portada .instituto { color: rgba(255,255,255,0.75); font-size: 15px; margin-top: 50px; }
    .portada .fecha { color: rgba(255,255,255,0.55); font-size: 13px; margin-top: 10px; }
    h3 { color: #3d5a96; font-size: 22px; margin-bottom: 18px; }
    .block { background: #fdf4f0; border-left: 5px solid #e8755c; padding: 15px 20px; border-radius: 0 10px 10px 0; margin: 15px 0; }
    .block-title { font-weight: 700; color: #e8755c; margin-bottom: 6px; font-size: 15px; }
    .block-blue { background: #eff2f8; border-left: 5px solid #3d5a96; }
    .block-blue .block-title { color: #3d5a96; }
    .block-pink { background: #fdf0f4; border-left: 5px solid #d05a7e; }
    .block-pink .block-title { color: #d05a7e; }
    .block-vino { background: #fdf0f2; border-left: 5px solid #691b31; }
    .block-vino .block-title { color: #691b31; }
    ul, ol { padding-left: 22px; line-height: 2.2; }
    li { margin-bottom: 4px; }
    .columns { display: flex; gap: 30px; }
    .columns > div { flex: 1; }
    table { width: 100%; border-collapse: collapse; margin: 15px 0; }
    th, td { border: 1px solid #ddd; padding: 10px 14px; text-align: left; }
    th { background: #3d5a96; color: #fff; }
    tr:nth-child(even) { background: #f8f9fc; }
    .tag { display: inline-block; background: #3d5a96; color: #fff; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; margin: 2px 4px 2px 0; }
    .tag-coral { background: #e8755c; }
    .example-box { background: #fafafa; border: 1.5px dashed #3d5a96; border-radius: 12px; padding: 18px 20px; margin: 15px 0; }
    .example-box h4 { color: #3d5a96; margin: 0 0 6px; font-size: 16px; }
    .example-box .Prompt { background: #fff; padding: 10px 14px; border-radius: 8px; border: 1px solid #e0e0e0; margin-top: 8px; font-style: italic; color: #555; }
    .example-box .resultado { background: #f0f4ff; padding: 8px 14px; border-radius: 8px; margin-top: 8px; font-size: 14px; color: #3d5a96; }
    .center { text-align: center; }
    .final { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 400px; text-align: center; }
    .final h2 { color: #3d5a96; font-size: 32px; margin-bottom: 20px; }
    .final p { color: #666; font-size: 18px; }
    .nav-bar { max-width: 1024px; margin: 10px auto; display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
    .nav-bar button { background: #3d5a96; color: #fff; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-family: 'Montserrat', sans-serif; font-weight: 600; font-size: 13px; transition: all 0.2s; }
    .nav-bar button:hover { background: #e8755c; transform: translateY(-2px); }
    .nav-bar button.activo { background: #d05a7e; }
    .nav-controls { max-width: 1024px; margin: 10px auto; display: flex; gap: 10px; justify-content: center; }
    .nav-controls button { background: #3d5a96; color: #fff; border: none; padding: 10px 28px; border-radius: 25px; cursor: pointer; font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 15px; transition: all 0.2s; }
    .nav-controls button:hover { background: #e8755c; transform: scale(1.05); }
    .counter { max-width: 1024px; margin: 5px auto; text-align: center; font-size: 13px; color: #888; }
    @media (max-width: 768px) {
        .portada h1 { font-size: 32px; }
        .portada h1 span { font-size: 24px; }
        .portada .tema { font-size: 20px; }
        .columns { flex-direction: column; }
        .slide-body { padding: 20px; }
        .slide-header h2 { font-size: 16px; }
    }
</style>
</head>
<body>

<div class="nav-controls">
    <button onclick="ant()">&#9664; Anterior</button>
    <button onclick="sig()">Siguiente &#9654;</button>
</div>
<div class="counter" id="counter"></div>

<div id="slides-container"></div>

<script>
var slides = [
    { Tipo: 'portada' },
    {
        titulo: 'Índice',
        num: '2 / 9',
        body: '<div class="columns" style="font-size:18px;line-height:2.4;"><div><strong style="color:#3d5a96;">1. ¿Qué es DALL-E?</strong><br>- Generación de imágenes con IA<br>- Acceso gratuito en ChatGPT<br><br><strong style="color:#3d5a96;">2. Como crear imágenes</strong><br>- Pasos básicos<br>- Consejos para Prompts visuales</div><div><strong style="color:#3d5a96;">3. Ejemplos prácticos</strong><br>- 6 Ejemplos paso a paso<br><br><strong style="color:#3d5a96;">4. Buenas prácticas</strong><br>- Consejos clave<br>- Comparativa de Prompts<br><br><strong style="color:#3d5a96;">5. Conclusión</strong></div></div>'
    },
    {
        titulo: '1. ¿Qué es DALL-E?',
        num: '3 / 9',
        body: '<div class="block"><div class="block-title">Definición</div>DALL-E es un sistema de inteligencia artificial desarrollado por OpenAI que genera imágenes a partir de descripciones escritas en lenguaje natural. Está integrado directamente en ChatGPT.</div><div style="margin-top:18px;"><strong style="color:#3d5a96;">¿Cómo acceder gratis?</strong><ul><li>Entra a <a href="https://chat.openai.com" target="_blank">chat.openai.com</a></li><li>Inicia sesión con tu cuenta gratuita</li><li>En la conversación, escribe un prompt describiendo la imagen que quieres crear</li><li>ChatGPT usará DALL-E automáticamente para generarla</li></ul></div><table style="margin-top:15px;"><tr><th style="width:35%;">Plataforma</th><th>¿Genera imágenes?</th></tr><tr><td>ChatGPT (gratuito)</td><td>Si, con DALL-E (Límite diario)</td></tr><tr><td>Gemini (gratuito)</td><td>Si, con Imagen de Google</td></tr><tr><td>Claude (gratuito)</td><td>No genera imágenes</td></tr></table><div class="block block-blue" style="margin-top:15px;"><div class="block-title">Dato clave</div>No necesitas saber de diseño ni de arte. Solo escribe lo que imaginas y DALL-E lo crea por ti.</div>'
    },
    {
        titulo: '2. Como crear imágenes con DALL-E',
        num: '4 / 9',
        body: '<h3>Pasos básicos</h3><ol style="font-size:16px;line-height:2.4;"><li><strong>Describe tu imagen:</strong> Escribe que quieres ver (objetos, colores, estilo, ambiente).</li><li><strong>Agrega detalles:</strong> Mientras más específico seas, mejor será el resultado.</li><li><strong>Especifica el estilo:</strong> Realista, animado, acuarela, dibujo, 3D, etc.</li><li><strong>Itera:</strong> Si no te gusta, pidele ajustes a ChatGPT.</li></ol><h3 style="margin-top:20px;">Consejos para un buen prompt visual</h3><table><tr><th>Elemento</th><th style="width:60%;">Ejemplo</th></tr><tr><td>Sujeto principal</td><td>"un gato", "una casa moderna", "un logotipo"</td></tr><tr><td>Entorno o fondo</td><td>"en una playa", "en un bosque", "fondo blanco"</td></tr><tr><td>Estilo artístico</td><td>"estilo acuarela", "fotorrealista", "animado", "dibujo a lápiz"</td></tr><tr><td>iluminación</td><td>"luz natural", "atardecer", "iluminación de estudio"</td></tr><tr><td>Colores</td><td>"tonos pastel", "blanco y negro", "colores vibrantes"</td></tr><tr><td>Formato</td><td>"horizontal 16:9", "cuadrado", "vertical"</td></tr></table><div class="block block-vino" style="margin-top:15px;"><div class="block-title">Fórmula recomendada</div><em>"Crea una imagen de [sujeto] en [entorno], estilo [estilo], con [colores/iluminación], formato [horizontal/cuadrado/vertical]."</em></div>'
    },
    {
        titulo: '3. Ejemplos prácticos (1-3)',
        num: '5 / 9',
        body: '<div class="example-box"><h4>Ejemplo 1: paisaje natural</h4><div class="prompt">"Crea una imagen de una montaña nevada con un lago cristalino al amanecer, estilo fotorrealista, colores fríos, formato horizontal."</div><div class="resultado">Ideal para fondos de pantalla o presentaciones sobre naturaleza.</div></div><div class="example-box"><h4>Ejemplo 2: logotipo institucional</h4><div class="prompt">"Diseña un logotipo moderno para un Instituto de Capacitación, con un libro abierto y una estrella, colores azul y naranja, estilo minimalista, fondo blanco."</div><div class="resultado">útil para proyectos visuales sin saber diseño gráfico.</div></div><div class="example-box"><h4>Ejemplo 3: Escena educativa animada</h4><div class="prompt">"Ilustración animada de un salón de clases con estudiantes diversos usando tablets, colores cálidos, estilo cartoon, formato cuadrado."</div><div class="resultado">Perfecto para materiales educativos o presentaciones.</div></div>'
    },
    {
        titulo: '3. Ejemplos prácticos (4-6)',
        num: '6 / 9',
        body: '<div class="example-box"><h4>Ejemplo 4: Imagen para redes</h4><div class="prompt">"Crea una imagen para Instagram de una taza de café humeante con hojas de otoño alrededor, estilo acuarela, tonos naranja y marrón, formato cuadrado."</div><div class="resultado">Ideal para publicaciones de redes sociales sin usar bancos de imágenes.</div></div><div class="example-box"><h4>Ejemplo 5: Producto ficticio</h4><div class="prompt">"Genera la imagen de un envase de perfume elegante de vidrio azul con un tapón dorado, sobre una superficie de mármol, iluminación de estudio, estilo fotorrealista."</div><div class="resultado">Sirve para catálogos conceptuales o lluvia de ideas de diseño.</div></div><div class="example-box"><h4>Ejemplo 6: Mascota / personaje</h4><div class="prompt">"Dibuja una abeja robot simpática con casco y herramientas, estilo animado 3D, colores amarillo y azul, fondo degradado."</div><div class="resultado">útil para crear personajes para campañas o juegos educativos.</div></div>'
    },
    {
        titulo: 'Comparativa: Prompt básico vs. detallado',
        num: '7 / 9',
        body: '<table><tr><th style="width:15%;">Tipo</th><th style="width:40%;">Prompt</th><th>Resultado esperado</th></tr><tr><td><span class="tag">Básico</span></td><td style="font-style:italic;color:#888;">"Un perro"</td><td>Imagen genérica, puede no tener fondo ni estilo definido.</td></tr><tr><td><span class="tag tag-coral">Detallado</span></td><td style="font-style:italic;color:#555;">"Un perro golden retriever jugando en un parque soleado, estilo fotorrealista, colores cálidos, formato horizontal."</td><td>Imagen específica, lista para usar.</td></tr><tr><td><span class="tag">Básico</span></td><td style="font-style:italic;color:#888;">"Una casa"</td><td>Resultado simple, sin detalles arquitectónicos.</td></tr><tr><td><span class="tag tag-coral">Detallado</span></td><td style="font-style:italic;color:#555;">"Casa moderna de dos pisos con jardín frontal y piscina, estilo render arquitectónico, iluminación de atardecer, formato horizontal."</td><td>Imagen profesional utilizable en presentaciones.</td></tr></table><div class="block block-pink" style="margin-top:15px;"><div class="block-title">Regla práctica</div>Tu prompt debe tener: <strong>sujeto + entorno + estilo + iluminación/colores + formato</strong>.</div>'
    },
    {
        titulo: '4. Buenas prácticas',
        num: '8 / 9',
        body: '<ul style="font-size:16px;line-height:2.4;"><li><strong>Sé descriptivo:</strong> No digas solo "un árbol", di "un árbol de cerezo en flor junto a un rio".</li><li><strong>Define el estilo:</strong> Especifica si quieres fotorrealista, dibujo animado, acuarela, 3D, etc.</li><li><strong>Usa referencias de color:</strong> "tonos pastel", "colores vibrantes", "blanco y negro".</li><li><strong>Ajusta el formato:</strong> "horizontal 16:9" para presentaciones, "cuadrado" para redes.</li><li><strong>Itera sin miedo:</strong> Pide cambios específicos si el resultado no es lo que esperabas.</li><li><strong>Límite diario:</strong> DALL-E tiene un límite de generaciones gratuitas. Usa <strong>Bing Image Creator</strong> o <strong>Gemini</strong>.</li></ul>'
    },
    {
        titulo: 'Conclusión',
        num: '9 / 9',
        body: '<ul style="font-size:16px;line-height:2.4;"><li>ChatGPT con DALL-E te permite crear imágenes <strong>sin saber diseñar</strong>.</li><li>La clave está en escribir <strong>prompts descriptivos y detallados</strong>.</li><li>Puedes generar imágenes para <strong>redes sociales, presentaciones, materiales educativos y más</strong>.</li><li>Es una herramienta gratuita accesible desde el navegador, <strong>sin instalar nada</strong>.</li></ul><div class="block center" style="margin-top:25px;"><div class="block-title">Frase final</div><em>"Tu imaginación es el límite. DALL-E lo convierte en imagen."</em></div>'
    },
    {
        titulo: 'Gracias por su atención!',
        num: '9 / 9',
        body: '<div class="final"><h2>¿Dudas o comentarios?</h2><p>Participa en el foro del tema</p><p style="margin-top:30px;color:#3d5a96;font-weight:700;">ICATHI 4.0 - Inteligencia Artificial para todos</p></div>'
    }
];

var actual = 0;

function renderSlide(i) {
    var s = slides[i];
    var c = document.getElementById("slides-container");
    if (s.Tipo === "portada") {
        c.innerHTML = "<div class=\"slide portada\"><div class=\"portada-bg\"></div><div class=\"franja1\"></div><div class=\"franja2\"></div><div class=\"franja3\"></div><div class=\"franja4\"></div><div class=\"portada-content\"><div class=\"campus\">CAMPUS VIRTUAL</div><h1>Inteligencia Artificial<span>para Todos</span></h1><div class=\"tema-label\">TEMA:</div><div class=\"tema\">Generación de imágenes gratuitas<br>dentro de ChatGPT</div><div class=\"instituto\">Instituto de Capacitación del Estado de Hidalgo</div><div class=\"fecha\">" + new Date().toLocaleDateString("es-MX", {year:"numeric",month:"long",day:"numeric"}) + "</div></div></div>";
    } else {
        c.innerHTML = "<div class=\"slide\"><div class=\"slide-header\"><h2>" + s.titulo + "</h2><span class=\"num\">" + s.num + "</span></div><div class=\"slide-body\">" + s.body + "</div><div class=\"slide-footer\"><span>ICATHI 4.0</span><span>" + s.num + "</span></div></div>";
    }
    document.getElementById("counter").textContent = "Diapositiva " + (i + 1) + " de " + slides.length;
    var btns = document.querySelectorAll(".nav-bar button");
    for (var j = 0; j < btns.length; j++) {
        btns[j].className = (j === i) ? "activo" : "";
    }
}

function sig() { if (actual < slides.length - 1) { actual++; renderSlide(actual); } }
function ant() { if (actual > 0) { actual--; renderSlide(actual); } }

document.addEventListener("DOMContentLoaded", function() {
    var nav = document.createElement("div");
    nav.className = "nav-bar";
    for (var i = 0; i < slides.length; i++) {
        (function(idx) {
            var b = document.createElement("button");
            b.textContent = idx + 1;
            b.onclick = function() { actual = idx; renderSlide(idx); };
            nav.appendChild(b);
        })(i);
    }
    document.body.insertBefore(nav, document.querySelector(".nav-controls"));
    renderSlide(0);
});
</script>
</body>
</html>
